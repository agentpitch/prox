name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  WINDIVERT_VERSION: 2.2.2
  WINDIVERT_RELEASE_URL: https://github.com/basil00/WinDivert/releases/download/v2.2.2/WinDivert-2.2.2-A.zip
  WINDIVERT_RELEASE_PAGE: https://github.com/basil00/WinDivert/releases/tag/v2.2.2

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.mod
            go.sum

      - name: Show Go version
        shell: pwsh
        run: go version

      - name: Download Go modules
        shell: pwsh
        run: go mod download

      - name: Test
        shell: pwsh
        run: go test -mod=mod ./...

      - name: Download WinDivert runtime
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $archivePath = Join-Path $env:RUNNER_TEMP "WinDivert-$env:WINDIVERT_VERSION-A.zip"
          $extractPath = Join-Path $env:RUNNER_TEMP "WinDivert-$env:WINDIVERT_VERSION-A"

          Remove-Item $archivePath -Force -ErrorAction SilentlyContinue
          Remove-Item $extractPath -Recurse -Force -ErrorAction SilentlyContinue

          Invoke-WebRequest -Uri $env:WINDIVERT_RELEASE_URL -OutFile $archivePath
          Expand-Archive -Path $archivePath -DestinationPath $extractPath -Force

          $dll = Get-ChildItem $extractPath -Recurse -Filter WinDivert.dll |
            Where-Object { $_.FullName -match '[\\/]x64[\\/]' } |
            Select-Object -First 1
          $sys = Get-ChildItem $extractPath -Recurse -Filter WinDivert64.sys |
            Where-Object { $_.FullName -match '[\\/]x64[\\/]' } |
            Select-Object -First 1

          if ($null -eq $dll -or $null -eq $sys) {
            throw "Failed to locate x64 WinDivert runtime files in $env:WINDIVERT_RELEASE_URL"
          }

          Copy-Item $dll.FullName (Join-Path $env:RUNNER_TEMP "WinDivert.dll")
          Copy-Item $sys.FullName (Join-Path $env:RUNNER_TEMP "WinDivert64.sys")

      - name: Build and package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build, package, release | Out-Null
          go build -mod=mod -trimpath -ldflags "-H=windowsgui -s -w" -o build\pitchProx.exe .\cmd\pitchprox

          Copy-Item "build\pitchProx.exe" "release\pitchProx.exe"
          Copy-Item "build\pitchProx.exe" "package\pitchProx.exe"
          Copy-Item (Join-Path $env:RUNNER_TEMP "WinDivert.dll") "package\WinDivert.dll"
          Copy-Item (Join-Path $env:RUNNER_TEMP "WinDivert64.sys") "package\WinDivert64.sys"

          foreach ($file in @("README.md", "CHECKS.md")) {
            if (Test-Path $file) {
              Copy-Item $file package\
            }
          }

          if (Test-Path docs) {
            Copy-Item docs package\docs -Recurse
          }

          Compress-Archive -Path package\* -DestinationPath release\pitchProx-windows-amd64.zip -Force

          $hashes = @(
            Get-FileHash -Algorithm SHA256 release\pitchProx.exe
            Get-FileHash -Algorithm SHA256 release\pitchProx-windows-amd64.zip
          ) | ForEach-Object {
            "{0} *{1}" -f $_.Hash.ToLower(), (Split-Path $_.Path -Leaf)
          }
          Set-Content -Path release\pitchProx-windows-amd64.sha256 -Value $hashes

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pitchProx-windows-amd64
          if-no-files-found: error
          path: |
            release/pitchProx.exe
            release/pitchProx-windows-amd64.zip
            release/pitchProx-windows-amd64.sha256

  release-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: windows-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          name: pitchProx-windows-amd64
          path: release-assets

      - name: Publish main prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-${{ github.sha }}
          target_commitish: ${{ github.sha }}
          name: Main build ${{ github.sha }}
          prerelease: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/**/pitchProx.exe
            release-assets/**/pitchProx-windows-amd64.zip
            release-assets/**/pitchProx-windows-amd64.sha256

  release-tag:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: windows-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          name: pitchProx-windows-amd64
          path: release-assets

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: |
            release-assets/**/pitchProx.exe
            release-assets/**/pitchProx-windows-amd64.zip
            release-assets/**/pitchProx-windows-amd64.sha256
